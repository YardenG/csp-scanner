services:
  - type: web
    name: csp-scanner
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 120
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: SCAN_INTERVAL_MINUTES
        value: "15"
      - key: ALERT_MIN_SIGNAL
        value: "MODERATE"
      - key: PYTHON_VERSION
        value: "3.11.0"
